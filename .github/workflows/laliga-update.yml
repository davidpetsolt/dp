name: LaLiga standings update

on:
  schedule:
    - cron: '30 4 * * *'   # 04:30 UTC = 06:30 CET; runs daily, catches the prior night's matches
  workflow_dispatch:        # manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: laliga-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Build laliga-standings.json
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
        run: node scripts/laliga-standings.js

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain laliga-standings.json)" ]; then
            git config user.name "laliga-bot"
            git config user.email "actions@users.noreply.github.com"
            git add laliga-standings.json
            git commit -m "Update LaLiga standings $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && exit 0
              echo "push rejected, remote moved; retry $i"; sleep 5
            done
            echo "push still failing after retries"; exit 1
          else
            echo "No change to laliga-standings.json; nothing to commit."
          fi
