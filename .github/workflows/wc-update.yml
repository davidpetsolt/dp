name: World Cup bracket update

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 07:00 CET (summer)
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: wc-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build results.json
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
        run: node scripts/wc-score.js

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain results.json)" ]; then
            git config user.name "wc-bot"
            git config user.email "actions@users.noreply.github.com"
            git add results.json
            git commit -m "Update World Cup results $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No change to results.json; nothing to commit."
          fi
