<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skin">
<title>Skincare Routine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --cream: #F5F0E8;
    --warm-white: #FDFAF5;
    --stone: #8C7E6E;
    --bark: #4A3F35;
    --ink: #1C1612;
    --gold: #C9A96E;
    --gold-light: #E8D5B0;
    --blush: #D4B5A0;
    --sage: #8A9E8C;
    --mist: #B8C4C0;
    --retinal: #C17B6B;
    --recovery: #7B9BC1;
    --exfol: #8BA87B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 60px;
    font-size: 14px;
  }

  header {
    background: var(--bark);
    color: var(--cream);
    padding: 52px 20px 24px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(201,169,110,0.15);
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 30px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(201,169,110,0.08);
  }

  .header-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    line-height: 1.15;
    color: var(--warm-white);
    position: relative;
    z-index: 1;
  }

  header h1 em {
    font-style: italic;
    color: var(--gold-light);
  }

  .version-tag {
    display: inline-block;
    margin-top: 10px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone);
    border: 1px solid rgba(140,126,110,0.4);
    padding: 3px 8px;
    border-radius: 2px;
    position: relative;
    z-index: 1;
  }

  /* Day selector */
  .day-strip {
    background: var(--bark);
    padding: 0 16px 16px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .day-strip::-webkit-scrollbar { display: none; }

  .day-btn {
    flex: 0 0 auto;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--mist);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.05em;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .day-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--bark);
    font-weight: 500;
  }

  .day-btn[data-type="retinal"].active { background: var(--retinal); border-color: var(--retinal); color: #fff; }
  .day-btn[data-type="recovery"].active { background: var(--recovery); border-color: var(--recovery); color: #fff; }
  .day-btn[data-type="exfol"].active { background: var(--exfol); border-color: var(--exfol); color: #fff; }

  /* Main content */
  .content { padding: 20px 16px 0; }

  /* Day label */
  .day-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .day-label-text {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
  }

  .evening-badge {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  .badge-retinal { background: rgba(193,123,107,0.15); color: var(--retinal); }
  .badge-recovery { background: rgba(123,155,193,0.15); color: var(--recovery); }
  .badge-exfol { background: rgba(139,168,123,0.15); color: var(--exfol); }
  .badge-standard { background: rgba(74,63,53,0.1); color: var(--bark); }

  /* Routine blocks */
  .routine-block {
    background: var(--warm-white);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    border: 1px solid rgba(140,126,110,0.12);
  }

  .block-header {
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid rgba(140,126,110,0.1);
  }

  .block-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .icon-am { background: rgba(201,169,110,0.2); }
  .icon-pm-retinal { background: rgba(193,123,107,0.2); }
  .icon-pm-recovery { background: rgba(123,155,193,0.2); }
  .icon-pm-exfol { background: rgba(139,168,123,0.2); }

  .block-title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 13px;
    color: var(--bark);
    letter-spacing: 0.02em;
  }

  .block-sub {
    font-size: 11px;
    color: var(--stone);
    margin-top: 1px;
  }

  /* Steps */
  .steps { padding: 4px 0 8px; }

  .step {
    display: flex;
    align-items: flex-start;
    padding: 9px 16px;
    gap: 12px;
    border-bottom: 1px solid rgba(140,126,110,0.06);
    transition: background 0.15s;
  }

  .step:last-child { border-bottom: none; }

  .step-num {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(140,126,110,0.12);
    color: var(--stone);
    font-size: 10px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .step-info { flex: 1; }

  .step-product {
    font-weight: 500;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.3;
  }

  .step-brand {
    font-size: 11px;
    color: var(--stone);
    margin-top: 1px;
  }

  .step-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    flex-shrink: 0;
    align-self: center;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .tag-core { background: rgba(74,63,53,0.1); color: var(--bark); }
  .tag-optional { background: rgba(140,126,110,0.1); color: var(--stone); }
  .tag-key { background: rgba(201,169,110,0.2); color: #8a6830; }

  /* Product inventory section */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--bark);
    margin: 24px 0 12px;
    padding-left: 2px;
  }

  .product-card {
    background: var(--warm-white);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border: 1px solid rgba(140,126,110,0.12);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }

  .product-name { font-weight: 500; font-size: 13px; line-height: 1.3; }
  .product-brand { font-size: 11px; color: var(--stone); margin-top: 2px; }
  .product-role { font-size: 11px; color: var(--stone); margin-top: 4px; font-style: italic; }

  /* Timeline */
  .timeline-block {
    background: var(--warm-white);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(140,126,110,0.12);
    margin-bottom: 24px;
  }

  .timeline-row {
    display: flex;
    padding: 11px 16px;
    gap: 12px;
    border-bottom: 1px solid rgba(140,126,110,0.06);
    align-items: flex-start;
  }

  .timeline-row:last-child { border-bottom: none; }

  .timeline-period {
    font-weight: 500;
    font-size: 12px;
    color: var(--gold);
    min-width: 64px;
    padding-top: 1px;
  }

  .timeline-text { font-size: 12px; color: var(--bark); line-height: 1.5; }

  /* Nav tabs */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--warm-white);
    border-top: 1px solid rgba(140,126,110,0.15);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .tab {
    flex: 1;
    padding: 12px 0 10px;
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--stone);
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
  }

  .tab.active { color: var(--bark); font-weight: 500; }

  .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

  /* Pages */
  .page { display: none; }
  .page.active { display: block; }

  /* Skin log */
  .log-entry {
    background: var(--warm-white);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border: 1px solid rgba(140,126,110,0.12);
  }

  .log-date { font-size: 11px; color: var(--gold); font-weight: 500; margin-bottom: 4px; }
  .log-text { font-size: 13px; color: var(--bark); line-height: 1.5; }

  .add-log-btn {
    width: 100%;
    background: var(--bark);
    color: var(--cream);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 16px;
  }

  textarea {
    width: 100%;
    background: var(--warm-white);
    border: 1px solid rgba(140,126,110,0.25);
    border-radius: 10px;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--bark);
    resize: none;
    min-height: 100px;
    margin-bottom: 8px;
  }

  .save-btn {
    background: var(--gold);
    color: var(--bark);
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-right: 8px;
  }

  .cancel-btn {
    background: none;
    color: var(--stone);
    border: 1px solid rgba(140,126,110,0.3);
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }

  .log-form { margin-bottom: 16px; display: none; }
  .log-form.open { display: block; }

  .empty-state {
    text-align: center;
    color: var(--stone);
    font-size: 13px;
    padding: 32px 0;
    font-style: italic;
  }
</style>
</head>
<body>

<!-- ROUTINE PAGE -->
<div class="page active" id="page-routine">
  <header>
    <div class="header-eyebrow">Routine v1.1</div>
    <h1>Skincare<br><em>Reference</em></h1>
    <div class="version-tag">Barcelona · Mediterranean</div>
  </header>

  <div class="day-strip">
    <button class="day-btn active" data-day="mon" data-type="retinal" onclick="setDay('mon')">Mon</button>
    <button class="day-btn" data-day="tue" data-type="recovery" onclick="setDay('tue')">Tue</button>
    <button class="day-btn" data-day="wed" data-type="retinal" onclick="setDay('wed')">Wed</button>
    <button class="day-btn" data-day="thu" data-type="recovery" onclick="setDay('thu')">Thu</button>
    <button class="day-btn" data-day="fri" data-type="retinal" onclick="setDay('fri')">Fri</button>
    <button class="day-btn" data-day="sat" data-type="recovery" onclick="setDay('sat')">Sat</button>
    <button class="day-btn" data-day="sun" data-type="exfol" onclick="setDay('sun')">Sun</button>
  </div>

  <div class="content" id="routine-content"></div>
</div>

<!-- PRODUCTS PAGE -->
<div class="page" id="page-products">
  <header>
    <div class="header-eyebrow">Full Inventory</div>
    <h1>Products &<br><em>Roles</em></h1>
  </header>
  <div class="content">
    <div id="product-list"></div>
    <div class="section-title">Expected Timeline</div>
    <div class="timeline-block">
      <div class="timeline-row">
        <div class="timeline-period">2–3 wks</div>
        <div class="timeline-text">Better hydration, improved texture</div>
      </div>
      <div class="timeline-row">
        <div class="timeline-period">4–6 wks</div>
        <div class="timeline-text">Lines softening, more even tone</div>
      </div>
      <div class="timeline-row">
        <div class="timeline-period">8–12 wks</div>
        <div class="timeline-text">Visible wrinkle improvement, more rested appearance</div>
      </div>
    </div>
  </div>
</div>

<!-- LOG PAGE -->
<div class="page" id="page-log">
  <header>
    <div class="header-eyebrow">Skin Journal</div>
    <h1>Reactions &<br><em>Progress</em></h1>
  </header>
  <div class="content">
    <button class="add-log-btn" onclick="openLogForm()">+ Add Entry</button>
    <div class="log-form" id="log-form">
      <textarea id="log-input" placeholder="Note a reaction, improvement, or product observation..."></textarea>
      <button class="save-btn" onclick="saveLog()">Save</button>
      <button class="cancel-btn" onclick="closeLogForm()">Cancel</button>
    </div>
    <div id="log-entries"></div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab active" onclick="showPage('routine', this)">
    <span class="tab-icon">☀</span>Routine
  </button>
  <button class="tab" onclick="showPage('products', this)">
    <span class="tab-icon">◻</span>Products
  </button>
  <button class="tab" onclick="showPage('log', this)">
    <span class="tab-icon">◇</span>Log
  </button>
</div>

<script>
const days = {
  mon: { type: 'retinal', label: 'Monday' },
  tue: { type: 'recovery', label: 'Tuesday' },
  wed: { type: 'retinal', label: 'Wednesday' },
  thu: { type: 'recovery', label: 'Thursday' },
  fri: { type: 'retinal', label: 'Friday' },
  sat: { type: 'recovery', label: 'Saturday' },
  sun: { type: 'exfol', label: 'Sunday' }
};

const routines = {
  am: [
    { product: 'Glucoside Foaming Cleanser', brand: 'The Ordinary', tag: 'core', tagLabel: 'Core' },
    { product: 'Take Back Time Eye Treatment', brand: 'Trinny London', tag: 'core', tagLabel: 'Core' },
    { product: 'Hyalu B5 Serum', brand: 'La Roche-Posay', tag: 'key', tagLabel: 'Key' },
    { product: 'Mela B3 Serum', brand: 'La Roche-Posay', tag: 'key', tagLabel: 'Key' },
    { product: 'Emulsion Supreme', brand: 'MD Dermalab', tag: 'core', tagLabel: 'Core' },
    { product: 'Anthelios SPF 50+', brand: 'La Roche-Posay', tag: 'core', tagLabel: 'Core' },
    { product: 'Multi-Peptide Lash & Brow Serum', brand: 'The Ordinary', tag: 'optional', tagLabel: 'Optional' },
  ],
  retinal: [
    { product: 'Squalane Cleanser', brand: 'The Ordinary', tag: 'core', tagLabel: 'Core' },
    { product: 'Take Back Time Eye Treatment', brand: 'Trinny London', tag: 'core', tagLabel: 'Core' },
    { product: 'Retinal 0.2% Emulsion', brand: 'The Ordinary', tag: 'key', tagLabel: 'Key' },
    { product: 'Emulsion Supreme', brand: 'MD Dermalab', tag: 'core', tagLabel: 'Core' },
  ],
  recovery: [
    { product: 'Squalane Cleanser', brand: 'The Ordinary', tag: 'core', tagLabel: 'Core' },
    { product: 'Take Back Time Eye Treatment', brand: 'Trinny London', tag: 'core', tagLabel: 'Core' },
    { product: 'Hyalu B5 Serum', brand: 'La Roche-Posay', tag: 'key', tagLabel: 'Key' },
    { product: 'Mela B3 Serum', brand: 'La Roche-Posay', tag: 'key', tagLabel: 'Key' },
    { product: 'Emulsion Supreme', brand: 'MD Dermalab', tag: 'core', tagLabel: 'Core' },
  ],
  exfol: [
    { product: 'Squalane Cleanser', brand: 'The Ordinary', tag: 'core', tagLabel: 'Core' },
    { product: 'Tiptoe In PHA Exfoliant', brand: 'Trinny London', tag: 'key', tagLabel: 'Key' },
    { product: 'Take Back Time Eye Treatment', brand: 'Trinny London', tag: 'core', tagLabel: 'Core' },
    { product: 'Emulsion Supreme', brand: 'MD Dermalab', tag: 'core', tagLabel: 'Core' },
  ]
};

const eveningLabels = {
  retinal: { label: 'Retinal Night', cls: 'badge-retinal' },
  recovery: { label: 'Recovery Night', cls: 'badge-recovery' },
  exfol: { label: 'Exfoliation Night', cls: 'badge-exfol' }
};

const amIcon = { icon: '○', cls: 'icon-am' };
const pmIcons = {
  retinal: { icon: '◆', cls: 'icon-pm-retinal' },
  recovery: { icon: '◇', cls: 'icon-pm-recovery' },
  exfol: { icon: '◈', cls: 'icon-pm-exfol' }
};

function stepsHtml(steps) {
  return steps.map((s, i) => `
    <div class="step">
      <div class="step-num">${i+1}</div>
      <div class="step-info">
        <div class="step-product">${s.product}</div>
        <div class="step-brand">${s.brand}</div>
      </div>
      <span class="step-tag tag-${s.tag}">${s.tagLabel}</span>
    </div>
  `).join('');
}

function renderRoutine(dayKey) {
  const day = days[dayKey];
  const type = day.type;
  const ev = eveningLabels[type];
  const pmIcon = pmIcons[type];

  document.getElementById('routine-content').innerHTML = `
    <div class="day-label">
      <span class="day-label-text">${day.label}</span>
      <span class="evening-badge ${ev.cls}">${ev.label}</span>
    </div>

    <div class="routine-block">
      <div class="block-header">
        <div class="block-icon ${amIcon.cls}">${amIcon.icon}</div>
        <div>
          <div class="block-title">Morning</div>
          <div class="block-sub">Every day · ends with SPF</div>
        </div>
      </div>
      <div class="steps">${stepsHtml(routines.am)}</div>
    </div>

    <div class="routine-block">
      <div class="block-header">
        <div class="block-icon ${pmIcon.cls}">${pmIcon.icon}</div>
        <div>
          <div class="block-title">Evening</div>
          <div class="block-sub">${ev.label}</div>
        </div>
      </div>
      <div class="steps">${stepsHtml(routines[type])}</div>
    </div>
  `;
}

function setDay(dayKey) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-day="${dayKey}"]`).classList.add('active');
  renderRoutine(dayKey);
}

// Products page
const products = [
  { name: 'Glucoside Foaming Cleanser', brand: 'The Ordinary', role: 'AM Cleanser', tag: 'core' },
  { name: 'Squalane Cleanser', brand: 'The Ordinary', role: 'PM Cleanser — removes SPF & buildup', tag: 'core' },
  { name: 'Hyalu B5 Serum', brand: 'La Roche-Posay', role: 'Hydration & plumping', tag: 'key' },
  { name: 'Mela B3 Serum', brand: 'La Roche-Posay', role: 'Tone correction & dark spots', tag: 'key' },
  { name: 'Retinal 0.2% Emulsion', brand: 'The Ordinary', role: 'Anti-aging primary — 3x/week', tag: 'key' },
  { name: 'Take Back Time Eye Treatment', brand: 'Trinny London', role: 'Peptides, crow\'s feet, under-eye', tag: 'core' },
  { name: 'Tiptoe In PHA Exfoliant', brand: 'Trinny London', role: 'Weekly exfoliation — low irritation', tag: 'core' },
  { name: 'Emulsion Supreme', brand: 'MD Dermalab', role: 'Primary moisturizer — ceramides + peptides', tag: 'core' },
  { name: 'Anthelios SPF 50+', brand: 'La Roche-Posay', role: 'Daily sunscreen — non-negotiable', tag: 'core' },
  { name: 'Multi-Peptide Lash & Brow Serum', brand: 'The Ordinary', role: 'Brow thickening — optional', tag: 'optional' },
];

function renderProducts() {
  document.getElementById('product-list').innerHTML = `
    <div class="section-title">Full Inventory</div>
    ${products.map(p => `
      <div class="product-card">
        <div>
          <div class="product-name">${p.name}</div>
          <div class="product-brand">${p.brand}</div>
          <div class="product-role">${p.role}</div>
        </div>
        <span class="step-tag tag-${p.tag}">${p.tag === 'optional' ? 'Optional' : p.tag === 'key' ? 'Key' : 'Core'}</span>
      </div>
    `).join('')}
  `;
}

// Log
function openLogForm() {
  document.getElementById('log-form').classList.add('open');
}

function closeLogForm() {
  document.getElementById('log-form').classList.remove('open');
  document.getElementById('log-input').value = '';
}

function saveLog() {
  const text = document.getElementById('log-input').value.trim();
  if (!text) return;
  const logs = JSON.parse(localStorage.getItem('skinLogs') || '[]');
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  logs.unshift({ date: dateStr, text });
  localStorage.setItem('skinLogs', JSON.stringify(logs));
  closeLogForm();
  renderLogs();
}

function renderLogs() {
  const logs = JSON.parse(localStorage.getItem('skinLogs') || '[]');
  const el = document.getElementById('log-entries');
  if (!logs.length) {
    el.innerHTML = '<div class="empty-state">No entries yet. Note reactions, improvements, or product observations.</div>';
    return;
  }
  el.innerHTML = logs.map(l => `
    <div class="log-entry">
      <div class="log-date">${l.date}</div>
      <div class="log-text">${l.text}</div>
    </div>
  `).join('');
}

// Tab nav
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

// Auto-select today
function getTodayKey() {
  const d = new Date().getDay();
  return ['sun','mon','tue','wed','thu','fri','sat'][d];
}

// Init
const todayKey = getTodayKey();
setDay(todayKey);
renderProducts();
renderLogs();
</script>
